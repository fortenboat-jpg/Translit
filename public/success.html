<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Оплата прошла — BirthCert Translation</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

         background: #f4f6fb; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: #fff; border-radius: 20px; padding: 48px 40px; max-width: 480px; width: 90%;
          text-align: center; box-shadow: 0 8px 40px rgba(0,0,0,.12); }
  .icon { font-size: 4rem; margin-bottom: 20px; }
  h1 { font-size: 1.6rem; color: #0c1b3a; margin-bottom: 12px; }
  p { color: #666; font-size: 1rem; line-height: 1.6; margin-bottom: 12px; }
  .highlight { background: #f0f4ff; border-radius: 10px; padding: 16px; margin: 20px 0; }
  .highlight strong { color: #1a46b8; }
  .btn { display: inline-block; background: #0c1b3a; color: #fff; padding: 14px 32px;
         border-radius: 10px; text-decoration: none; font-weight: 600; margin-top: 20px; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">✅</div>
  <h1>Оплата прошла успешно!</h1>
  <p>Спасибо за заказ. Ваш перевод уже готовится.</p>
  <div class="highlight">
    <strong>📧 Документы будут отправлены на ваш email в течение 10 минут.</strong>
    <p style="margin-top:8px;font-size:.9rem">Проверьте папку «Входящие» и «Спам».</p>
  </div>
  <p>В письме вы получите 4 файла:<br>
    бланк 1 (PDF), бланк 2 (PDF + DOCX) и удостоверение перевода (PDF).</p>
  <a href="/" class="btn">← На главную</a>
</div>
</body>
</html>
